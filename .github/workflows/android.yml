name: Android CI and Release

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

  android-test:
    runs-on: ubuntu-latest
    needs: unit-test
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM for faster emulator boot
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          emulator-boot-timeout: 900
          script: |
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            ./gradlew connectedDebugAndroidTest --no-daemon

  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: android-test
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Secret RELEASE_KEYSTORE_BASE64 is not set."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Export signing and Play metadata
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          VERSION_CODE_BASE: ${{ secrets.VERSION_CODE_BASE }}
          ADMOB_APPLICATION_ID: ${{ secrets.ADMOB_APPLICATION_ID }}
          ADMOB_NATIVE_AD_UNIT_ID: ${{ secrets.ADMOB_NATIVE_AD_UNIT_ID }}
          ADMOB_BANNER_AD_UNIT_ID: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
          PRIVACY_POLICY_URL: ${{ secrets.PRIVACY_POLICY_URL }}
        run: |
          if [ -z "$VERSION_CODE_BASE" ]; then
            echo "Secret VERSION_CODE_BASE is not set (must exceed max Play versionCode)."
            exit 1
          fi
          for name in RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD ADMOB_APPLICATION_ID ADMOB_NATIVE_AD_UNIT_ID ADMOB_BANNER_AD_UNIT_ID ADMOB_INTERSTITIAL_AD_UNIT_ID; do
            eval "v=\$$name"
            if [ -z "$v" ]; then
              echo "Secret $name is not set."
              exit 1
            fi
          done
          echo "RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "ADMOB_APPLICATION_ID=$ADMOB_APPLICATION_ID" >> "$GITHUB_ENV"
          echo "ADMOB_NATIVE_AD_UNIT_ID=$ADMOB_NATIVE_AD_UNIT_ID" >> "$GITHUB_ENV"
          echo "ADMOB_BANNER_AD_UNIT_ID=$ADMOB_BANNER_AD_UNIT_ID" >> "$GITHUB_ENV"
          echo "ADMOB_INTERSTITIAL_AD_UNIT_ID=$ADMOB_INTERSTITIAL_AD_UNIT_ID" >> "$GITHUB_ENV"
          if [ -n "$PRIVACY_POLICY_URL" ]; then
            echo "PRIVACY_POLICY_URL=$PRIVACY_POLICY_URL" >> "$GITHUB_ENV"
          fi
          echo "VERSION_CODE=$((VERSION_CODE_BASE + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"

      - name: Record version code
        id: meta
        run: echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Build signed release artifacts
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: r${{ github.run_number }}
          name: Sticky Notes (versionCode ${{ steps.meta.outputs.version_code }})
          body: |
            Automated signed build from commit ${{ github.sha }}.

            **versionCode:** ${{ steps.meta.outputs.version_code }} (`VERSION_CODE_BASE` + `github.run_number`).
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
